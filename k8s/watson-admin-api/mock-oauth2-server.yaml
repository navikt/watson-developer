apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-oauth2-config
data:
  JSON_CONFIG: |
    {
      "interactiveLogin": true,
      "httpServer": "NettyWrapper",
      "tokenCallbacks": [
        {
          "issuerId": "azuread",
          "requestMappings": [
            {
              "requestParam": "grant_type",
              "match": "*",
              "claims": {
                "aud": ["watson-admin-api"],
                "sub": "local-dev-user",
                "NAVident": "L999999",
                "name": "Lokal Utvikler",
                "preferred_username": "local-dev@nav.no",
                "oid": "00000000-0000-0000-0000-000000000001",
                "groups": ["local-basic-id", "local-utvidet-id"]
              }
            }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-oauth2-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-oauth2-server
  template:
    metadata:
      labels:
        app: mock-oauth2-server
      annotations:
        # Bump config-version når JSON_CONFIG endres for å tvinge pod-restart
        config-version: "2"
    spec:
      containers:
        - name: mock-oauth2-server
          image: ghcr.io/navikt/mock-oauth2-server:2.1.10
          env:
            - name: SERVER_PORT
              value: "8090"
            - name: JSON_CONFIG
              valueFrom:
                configMapKeyRef:
                  name: mock-oauth2-config
                  key: JSON_CONFIG
          ports:
            - containerPort: 8090
          readinessProbe:
            httpGet:
              path: /azuread/.well-known/openid-configuration
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: mock-oauth2-server
spec:
  selector:
    app: mock-oauth2-server
  ports:
    - port: 8090
      targetPort: 8090
